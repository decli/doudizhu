name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Generate temporary signing key
        run: |
          keytool -genkeypair \
            -keystore release-keystore.jks \
            -storetype PKCS12 \
            -storepass android \
            -keypass android \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Decli, OU=Codex, O=Decli, L=Shanghai, S=Shanghai, C=CN"

      - name: Sign APK
        run: |
          zipalign -p -f 4 app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/doudizhu-aligned.apk
          apksigner sign \
            --ks release-keystore.jks \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out app/build/outputs/apk/release/doudizhu-release.apk \
            app/build/outputs/apk/release/doudizhu-aligned.apk
          apksigner verify app/build/outputs/apk/release/doudizhu-release.apk

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/doudizhu-release.apk
          generate_release_notes: true
